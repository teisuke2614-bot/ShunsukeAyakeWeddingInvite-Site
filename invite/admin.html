<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP管理画面 | Shunsuke & Ayaka Wedding</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='15' y='10' width='70' height='80' rx='8' fill='none' stroke='%233A3230' stroke-width='6'/><line x1='30' y1='35' x2='70' y2='35' stroke='%233A3230' stroke-width='4'/><line x1='30' y1='55' x2='70' y2='55' stroke='%233A3230' stroke-width='4'/><line x1='30' y1='75' x2='55' y2='75' stroke='%233A3230' stroke-width='4'/></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body style="background: var(--color-cream-light);">

  <!-- ========== HEADER ========== -->
  <header class="admin-header">
    <div class="admin-header__inner">
      <div>
        <h1 class="admin-header__title">RSVP 管理画面</h1>
      </div>
      <div style="display: flex; align-items: center; gap: 16px;">
        <a href="index.html" style="color: var(--color-gold-light); font-size: 0.8rem;">招待フォーム →</a>
        <span class="admin-header__logo">Shunsuke & Ayaka</span>
      </div>
    </div>
  </header>

  <!-- ========== CONTENT ========== -->
  <main class="admin-content">

    <!-- Stats Cards -->
    <div class="admin-stats" id="stats">
      <div class="stat-card">
        <div class="stat-card__icon"><span class="stat-icon stat-icon--total"></span></div>
        <div class="stat-card__value" id="stat-total">0</div>
        <div class="stat-card__label">総回答数</div>
      </div>
      <div class="stat-card stat-card--attending">
        <div class="stat-card__icon"><span class="stat-icon stat-icon--attend"></span></div>
        <div class="stat-card__value" id="stat-attending">0</div>
        <div class="stat-card__label">出席</div>
      </div>
      <div class="stat-card stat-card--absent">
        <div class="stat-card__icon"><span class="stat-icon stat-icon--absent"></span></div>
        <div class="stat-card__value" id="stat-absent">0</div>
        <div class="stat-card__label">欠席</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__icon"><span class="stat-icon stat-icon--guests"></span></div>
        <div class="stat-card__value" id="stat-guests">0</div>
        <div class="stat-card__label">総出席人数（同伴者含む）</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__icon"><span class="stat-icon stat-icon--shuttle"></span></div>
        <div class="stat-card__value" id="stat-shuttle">0</div>
        <div class="stat-card__label">送迎バス利用</div>
      </div>
    </div>

    <!-- Meal Stats -->
    <div class="admin-stats" style="margin-bottom: 32px;">
      <div class="stat-card">
        <div class="stat-card__icon"><span class="stat-icon stat-icon--meat"></span></div>
        <div class="stat-card__value" id="stat-meat">0</div>
        <div class="stat-card__label">肉料理</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__icon"><span class="stat-icon stat-icon--fish"></span></div>
        <div class="stat-card__value" id="stat-fish">0</div>
        <div class="stat-card__label">魚料理</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__icon"><span class="stat-icon stat-icon--veg"></span></div>
        <div class="stat-card__value" id="stat-veg">0</div>
        <div class="stat-card__label">ベジタリアン</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__icon"><span class="stat-icon stat-icon--allergy"></span></div>
        <div class="stat-card__value" id="stat-allergy">0</div>
        <div class="stat-card__label">アレルギーあり</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="admin-toolbar">
      <input type="text" class="admin-toolbar__search" id="search-input" placeholder="名前で検索...">
      <div class="admin-toolbar__actions">
        <button class="btn btn--admin btn--sample" onclick="handleAddSample()" id="sample-btn">
          サンプルデータ追加
        </button>
        <button class="btn btn--admin btn--export" onclick="exportCSV()">
          CSVエクスポート
        </button>
        <button class="btn btn--admin btn--danger" onclick="handleClearAll()">
          全削除
        </button>
      </div>
    </div>

    <!-- Filter Tabs -->
    <div class="admin-filters" id="filters">
      <button class="filter-tab active" data-filter="all" onclick="setFilter('all', this)">すべて</button>
      <button class="filter-tab" data-filter="出席" onclick="setFilter('出席', this)">出席のみ</button>
      <button class="filter-tab" data-filter="欠席" onclick="setFilter('欠席', this)">欠席のみ</button>
    </div>

    <!-- Data Table -->
    <div class="admin-table-container">
      <table class="admin-table" id="data-table">
        <thead>
          <tr>
            <th>回答日</th>
            <th>ご出欠</th>
            <th>お名前</th>
            <th>フリガナ</th>
            <th>メール</th>
            <th>関係</th>
            <th>同伴者</th>
            <th>お食事</th>
            <th>アレルギー</th>
            <th>バス</th>
            <th>メッセージ</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="table-body">
        </tbody>
      </table>

      <div class="admin-empty" id="empty-state">
        <div class="admin-empty__icon">—</div>
        <p class="admin-empty__text">まだ回答がありません</p>
        <p style="font-size: 0.8rem; color: var(--color-brown-light); margin-top: 8px;">
          「サンプルデータ追加」ボタンでテストデータを作成できます
        </p>
      </div>
    </div>

  </main>

  <footer class="rsvp-footer" style="margin-top: 40px;">
    <p class="rsvp-footer__names">Shunsuke & Ayaka</p>
    <p class="rsvp-footer__date">RSVP Admin Dashboard</p>
  </footer>

  <script src="script.js"></script>
  <script>
    // ============================================================
    // ADMIN PAGE LOGIC
    // ============================================================
    let currentFilter = 'all';
    let searchQuery = '';

    function updateStats() {
      const responses = getResponses();
      const attending = responses.filter(r => r.attendance === '出席');
      const absent = responses.filter(r => r.attendance === '欠席');

      // Total guests including companions
      let totalGuests = attending.length;
      attending.forEach(r => {
        if (r.hasCompanion && r.companionCount) {
          totalGuests += r.companionCount;
        }
      });

      document.getElementById('stat-total').textContent = responses.length;
      document.getElementById('stat-attending').textContent = attending.length;
      document.getElementById('stat-absent').textContent = absent.length;
      document.getElementById('stat-guests').textContent = totalGuests;
      document.getElementById('stat-shuttle').textContent =
        attending.filter(r => r.shuttle === '利用する').length;

      // Meal stats
      document.getElementById('stat-meat').textContent =
        attending.filter(r => r.meal === '肉料理').length;
      document.getElementById('stat-fish').textContent =
        attending.filter(r => r.meal === '魚料理').length;
      document.getElementById('stat-veg').textContent =
        attending.filter(r => r.meal === 'ベジタリアン').length;
      document.getElementById('stat-allergy').textContent =
        responses.filter(r => r.allergy && r.allergy.trim()).length;
    }

    function renderTable() {
      let responses = getResponses();

      // Apply filter
      if (currentFilter !== 'all') {
        responses = responses.filter(r => r.attendance === currentFilter);
      }

      // Apply search
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        responses = responses.filter(r =>
          `${r.lastName}${r.firstName}`.includes(q) ||
          `${r.lastNameKana}${r.firstNameKana}`.includes(q) ||
          (r.email && r.email.toLowerCase().includes(q))
        );
      }

      // Sort by timestamp (newest first)
      responses.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

      const tbody = document.getElementById('table-body');
      const emptyState = document.getElementById('empty-state');

      if (responses.length === 0) {
        tbody.innerHTML = '';
        emptyState.style.display = '';
        return;
      }

      emptyState.style.display = 'none';

      tbody.innerHTML = responses.map(r => `
        <tr>
          <td style="white-space: nowrap; font-size: 0.75rem;">
            ${new Date(r.timestamp).toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' })}
          </td>
          <td>
            <span class="badge ${r.attendance === '出席' ? 'badge--attending' : 'badge--absent'}">
              ${r.attendance}
            </span>
          </td>
          <td style="font-weight: 400;">${r.lastName} ${r.firstName}</td>
          <td style="font-size: 0.75rem; color: var(--color-brown-light);">
            ${r.lastNameKana} ${r.firstNameKana}
          </td>
          <td style="font-size: 0.75rem;">${r.email}</td>
          <td style="font-size: 0.75rem;">${r.relationship}</td>
          <td style="font-size: 0.75rem;">
            ${r.hasCompanion && r.companionNames && r.companionNames.length > 0
              ? r.companionNames.join('<br>')
              : '—'}
          </td>
          <td>${r.meal || '—'}</td>
          <td style="font-size: 0.75rem; color: ${r.allergy ? 'var(--color-error)' : 'var(--color-brown-light)'};">
            ${r.allergy || '—'}
          </td>
          <td style="font-size: 0.75rem;">${r.shuttle || '—'}</td>
          <td style="font-size: 0.75rem; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"
              title="${(r.message || '').replace(/"/g, '&quot;')}">
            ${r.message || '—'}
          </td>
          <td>
            <button class="action-btn" onclick="handleDelete('${r.id}')">削除</button>
          </td>
        </tr>
      `).join('');
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderTable();
    }

    function handleDelete(id) {
      if (confirm('この回答を削除しますか？')) {
        deleteResponse(id);
        refresh();
      }
    }

    function handleClearAll() {
      const count = getResponses().length;
      if (count === 0) {
        alert('削除するデータがありません');
        return;
      }
      if (confirm(`${count}件の回答をすべて削除しますか？\nこの操作は取り消せません。`)) {
        clearAllResponses();
        refresh();
      }
    }

    function handleAddSample() {
      addSampleData();
      refresh();
    }

    function refresh() {
      updateStats();
      renderTable();
    }

    // Search handler
    document.getElementById('search-input').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderTable();
    });

    // Initial render
    refresh();
  </script>
</body>
</html>
